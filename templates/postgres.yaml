apiVersion: v1
kind: Service
metadata:
  name: postgres
spec:
  clusterIP: None

  selector:
    app: postgres

  ports:
    - port: 5432
      targetPort: 5432

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres

spec:
  serviceName: postgres
  replicas: 1

  selector:
    matchLabels:
      app: postgres

  template:
    metadata:
      labels:
        app: postgres

    spec:
      containers:
        - name: postgres
          image: postgres:15

          ports:
            - containerPort: 5432

          env:
            - name: POSTGRES_USER
              value: genesis

            - name: POSTGRES_PASSWORD
              value: genesis123

            - name: POSTGRES_DB
              value: genesis

          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data

  volumeClaimTemplates:
    - metadata:
        name: postgres-storage

      spec:
        storageClassName: local-path
        accessModes:
          - ReadWriteOnce

        resources:
          requests:
            storage: 5Gi